<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trading Terminal</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<style>
:root {
  --bg:#04111f;
  --bg-soft:#0a1628;
  --panel:#0c1729;
  --panel-strong:#101d34;
  --line:#21314c;
  --text:#f8fafc;
  --muted:#8ea3bf;
  --green:#22c55e;
  --green-soft:#052e16;
  --red:#ef4444;
  --red-soft:#3f0d12;
  --amber:#f59e0b;
  --amber-soft:#3b2307;
}

body {
  margin:0;
  font-family:"Segoe UI", "Trebuchet MS", sans-serif;
  background:
    radial-gradient(circle at top, rgba(34, 197, 94, 0.08), transparent 28%),
    linear-gradient(180deg, #071221 0%, var(--bg) 100%);
  color:var(--text);
}

.container { max-width:920px; margin:auto; padding:24px 20px 36px; }
.top { display:flex; justify-content:space-between; gap:12px; margin-bottom:20px; }

.page-tools {
  display:flex;
  justify-content:flex-end;
  margin-bottom:10px;
}

.market-bar, .chart-bar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px 16px;
  border:1px solid var(--line);
  background:linear-gradient(180deg, rgba(16, 29, 52, 0.96), rgba(12, 23, 41, 0.96));
  box-shadow:0 18px 45px rgba(2, 6, 23, 0.28);
  backdrop-filter:blur(10px);
}

.market-bar {
  margin-top:14px;
  border-radius:12px;
}

.chart-bar {
  margin-top:20px;
  border-radius:12px 12px 0 0;
}

.market-meta {
  display:flex;
  flex-direction:column;
  gap:4px;
}

.market-label {
  color:var(--muted);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:0.08em;
}

.market-value, .chart-meta {
  color:var(--muted);
  font-size:14px;
}

.chart-meta-row {
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.session-badge {
  display:inline-flex;
  align-items:center;
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  letter-spacing:0.04em;
  border:1px solid var(--line);
  color:var(--text);
  background:rgba(12, 23, 41, 0.92);
}

.session-badge.premarket {
  border-color:#1d4ed8;
  background:#0b1f46;
}

.session-badge.regular {
  border-color:#1f7a45;
  background:#052e16;
}

.session-badge.afterhours {
  border-color:#a16207;
  background:#3b2307;
}

.session-badge.closed {
  border-color:#475569;
  background:#172033;
}

.chart-title {
  color:var(--text);
  font-size:18px;
  font-weight:700;
  letter-spacing:0.01em;
}

input {
  flex:1;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid var(--line);
  background:rgba(12, 23, 41, 0.92);
  color:var(--text);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.03);
}

button {
  padding:10px 14px;
  border-radius:12px;
  border:1px solid transparent;
  cursor:pointer;
  transition:transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
}

button:hover {
  transform:translateY(-1px);
}

button:disabled { opacity:0.6; cursor:not-allowed; }

.analyze-btn {
  background:linear-gradient(180deg, #34d399, var(--green));
  color:#03110a;
  font-weight:700;
  min-width:120px;
}

.strategy, .tf-bar { display:flex; gap:6px; margin-top:10px; }

.tf-bar {
  margin-top:12px;
}

.strategy button, .tf-bar button {
  flex:1;
  background:rgba(12, 23, 41, 0.92);
  border-color:var(--line);
  color:var(--muted);
}

.strategy button.active, .tf-bar button.active {
  background:linear-gradient(180deg, #16304d, #11233b);
  border-color:#335176;
  color:var(--text);
}

.saved-btn {
  background:#14532d;
  color:#dcfce7;
  font-weight:700;
  border-color:#1f7a45;
}

.card {
  margin-top:22px;
  padding:22px;
  border:1px solid var(--line);
  border-radius:22px;
  background:
    linear-gradient(180deg, rgba(16, 29, 52, 0.98), rgba(10, 22, 40, 0.98));
  box-shadow:0 22px 50px rgba(2, 6, 23, 0.35);
}

.price { font-size:46px; font-weight:800; letter-spacing:-0.03em; }

.price-row {
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}

.ticker-label {
  color:var(--muted);
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:0.1em;
}

.change-pill {
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 12px;
  border-radius:999px;
  font-size:14px;
  font-weight:700;
}

.change-pill.up {
  background:rgba(6, 46, 22, 0.95);
  border:1px solid #1f7a45;
}

.change-pill.down {
  background:rgba(63, 13, 18, 0.95);
  border:1px solid #991b1b;
}

.trend-arrow {
  font-size:16px;
  line-height:1;
}

.status {
  margin-top:16px;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid #334155;
  background:rgba(12, 23, 41, 0.96);
  color:#cbd5e1;
}

.status.warning {
  border-color:#92400e;
  background:#1c1917;
  color:#fdba74;
}

.status.ok {
  border-color:#14532d;
  background:#052e16;
  color:#bbf7d0;
}

.up { color:#22c55e; }
.down { color:#ef4444; }

.section { margin-top:16px; border-top:1px solid var(--line); padding-top:12px; }

.indicator-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
  gap:10px;
  margin-top:10px;
}

.indicator-card {
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  background:linear-gradient(180deg, rgba(16, 29, 52, 0.95), rgba(12, 23, 41, 0.95));
}

.indicator-name {
  color:var(--muted);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:0.08em;
}

.indicator-value {
  margin-top:8px;
  font-size:28px;
  font-weight:700;
  color:var(--text);
}

.indicator-meta {
  margin-top:6px;
  color:var(--muted);
  font-size:13px;
}

.indicator-card.skew-low {
  border-color:#1f7a45;
  background:linear-gradient(180deg, rgba(6, 46, 22, 0.9), rgba(8, 35, 23, 0.96));
}

.indicator-card.skew-mid {
  border-color:#a16207;
  background:linear-gradient(180deg, rgba(59, 35, 7, 0.9), rgba(43, 27, 9, 0.96));
}

.indicator-card.skew-high {
  border-color:#991b1b;
  background:linear-gradient(180deg, rgba(63, 13, 18, 0.9), rgba(42, 14, 16, 0.96));
}

.signal-chip {
  display:inline-flex;
  align-items:center;
  margin-top:14px;
  padding:8px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
  letter-spacing:0.06em;
}

.signal-chip.buy {
  background:#052e16;
  border:1px solid #14532d;
  color:#bbf7d0;
}

.signal-chip.sell {
  background:#3f0d12;
  border:1px solid #7f1d1d;
  color:#fecaca;
}

.signal-chip.wait {
  background:#172033;
  border:1px solid #334155;
  color:#cbd5e1;
}

.watch {
  position:fixed; right:0; top:0;
  width:280px; height:100%;
  background:linear-gradient(180deg, #071221, #04111f);
  border-left:1px solid var(--line);
  padding:16px;
  transform:translateX(100%);
  transition:transform 0.25s ease;
  z-index:20;
}

.watch.open {
  transform:translateX(0);
}

.watch-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}

.watch-toggle {
  background:rgba(12, 23, 41, 0.92);
  color:#e2e8f0;
  border-color:var(--line);
}

.watch-close {
  background:#1e293b;
  color:#e2e8f0;
  border-color:#314463;
}

.watch-backdrop {
  position:fixed;
  inset:0;
  background:rgba(2, 6, 23, 0.45);
  opacity:0;
  pointer-events:none;
  transition:opacity 0.25s ease;
  z-index:10;
}

.watch-backdrop.open {
  opacity:1;
  pointer-events:auto;
}

.watch-item {
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  padding:10px 0;
  border-bottom:1px solid var(--line);
}

.watch-ticker {
  cursor:pointer;
  color:#e2e8f0;
}

.watch-symbol {
  font-weight:600;
}

.watch-details {
  color:#94a3b8;
  font-size:13px;
}

.watch-main {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.watch-copy {
  min-width:0;
}

.watch-sparkline {
  width:78px;
  height:28px;
  flex:0 0 auto;
  opacity:0.95;
}

.watch-change-up {
  color:#22c55e;
}

.watch-change-down {
  color:#ef4444;
}

.watch-remove {
  background:#7f1d1d;
  color:#fecaca;
  padding:6px 10px;
}

.watch-empty {
  color:#64748b;
  font-size:14px;
}

.paper-panel {
  margin-top:18px;
  padding:18px;
  border:1px solid var(--line);
  border-radius:18px;
  background:linear-gradient(180deg, rgba(16, 29, 52, 0.96), rgba(8, 18, 34, 0.98));
}

.paper-head {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;
}

.paper-title {
  font-size:16px;
  font-weight:700;
}

.paper-subtitle {
  color:var(--muted);
  font-size:13px;
}

.paper-summary {
  color:var(--muted);
  font-size:14px;
  margin-bottom:10px;
}

.paper-empty {
  color:var(--muted);
  font-size:14px;
}

.paper-list {
  display:flex;
  flex-direction:column;
  gap:10px;
}

.paper-item {
  display:grid;
  grid-template-columns:1fr auto;
  gap:12px;
  padding:12px;
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(12, 23, 41, 0.92);
}

.paper-symbol {
  font-size:15px;
  font-weight:700;
}

.paper-details {
  color:var(--muted);
  font-size:13px;
  margin-top:4px;
}

.paper-actions {
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  margin-top:12px;
}

.paper-btn {
  font-weight:700;
}

.paper-btn.buy {
  background:#052e16;
  color:#bbf7d0;
  border-color:#1f7a45;
}

.paper-btn.sell {
  background:#3f0d12;
  color:#fecaca;
  border-color:#991b1b;
}

.paper-btn.close {
  background:#172033;
  color:#dbeafe;
  border-color:#335176;
}

.chart-empty {
  display:flex;
  align-items:center;
  justify-content:center;
  height:430px;
  border:1px dashed #334155;
  border-top:none;
  border-radius:0 0 12px 12px;
  color:#94a3b8;
  background:#0b1220;
  text-align:center;
  padding:20px;
}

#chart {
  width:100%;
  height:430px;
  border:1px solid var(--line);
  border-top:none;
  border-radius:0 0 12px 12px;
  overflow:hidden;
}

@media (max-width: 720px) {
  .top,
  .market-bar,
  .chart-bar {
    flex-direction:column;
    align-items:stretch;
  }

  .price {
    font-size:38px;
  }

  .watch {
    width:min(88vw, 320px);
  }
}
</style>
</head>

<body>

<div id="watchBackdrop" class="watch-backdrop" onclick="closeWatchlist()"></div>

<div class="container">

  <div class="page-tools">
    <button class="watch-toggle" onclick="openWatchlist()">Watchlist</button>
  </div>

  <div class="top">
    <input id="ticker" placeholder="Search ticker"/>
    <button class="analyze-btn" onclick="analyze()">Analyze</button>
  </div>

  <div class="market-bar">
    <div class="market-meta">
      <div class="market-label">Last Updated</div>
      <div class="market-value" id="lastUpdated">Waiting for data...</div>
    </div>
    <button id="refreshBtn" onclick="manualRefresh()">Refresh Now</button>
  </div>

  <div class="strategy" id="strategyBar">
    <button data-s="scalp">Scalp</button>
    <button data-s="day" class="active">Day</button>
    <button data-s="swing">Swing</button>
    <button data-s="momentum">Momentum</button>
    <button data-s="mean">Mean</button>
  </div>

  <div id="result"></div>
  <div id="status"></div>

  <div class="chart-bar">
    <div>
      <div class="chart-title" id="chartTitle">Price Chart</div>
      <div class="chart-meta-row">
        <div class="chart-meta" id="chartMeta">Waiting for ticker selection</div>
        <div class="session-badge closed" id="sessionBadge">Closed</div>
      </div>
    </div>
  </div>
  <div id="chart"></div>

  <div class="tf-bar" id="tfBar">
    <button data-tf="1m">1M</button>
    <button data-tf="5m" class="active">5M</button>
    <button data-tf="15m">15M</button>
  </div>

  <div class="paper-panel">
    <div class="paper-head">
      <div>
        <div class="paper-title">Paper Trading</div>
        <div class="paper-subtitle">Simulated positions saved on this device</div>
      </div>
    </div>
    <div class="paper-summary" id="paperSummary">No open paper positions yet.</div>
    <div class="paper-list" id="paperPositions"></div>
  </div>

</div>

<div id="watchPanel" class="watch">
  <div class="watch-header">
    <h4>Watchlist</h4>
    <button class="watch-close" onclick="closeWatchlist()">Close</button>
  </div>
  <div id="watchlist"></div>
</div>

<script>
let strategy = "day";
let timeframe = "5m";
let lastTicker = null;
let watchlist = [];
let watchlistData = [];
let isLoading = false;
const WATCHLIST_STORAGE_KEY = "trading-app-watchlist";
const PAPER_POSITIONS_STORAGE_KEY = "trading-app-paper-positions";
let paperPositions = [];
const latestQuotes = {};
const intradayEtFormatter = new Intl.DateTimeFormat("en-US", {
  timeZone: "America/New_York",
  month: "numeric",
  day: "numeric",
  hour: "numeric",
  minute: "2-digit",
  hour12: true
});
const intradayAxisFormatter = new Intl.DateTimeFormat("en-US", {
  timeZone: "America/New_York",
  hour: "numeric",
  minute: "2-digit",
  hour12: true
});
function setStatus(message, tone=""){
  const el = document.getElementById("status");
  if(!message){
    el.innerHTML = "";
    return;
  }
  el.innerHTML = `<div class="status ${tone}">${message}</div>`;
}

function setLastUpdated(message){
  document.getElementById("lastUpdated").innerText = message;
}

function setChartMeta(ticker, sourceLabel){
  document.getElementById("chartTitle").innerText = ticker ? `${ticker} Candlestick Chart` : "Price Chart";
  document.getElementById("chartMeta").innerText = `${timeframe.toUpperCase()} timeframe ET${sourceLabel ? ` - ${sourceLabel}` : ""}`;
}

function setSessionBadge(sessionLabel){
  const badge = document.getElementById("sessionBadge");
  const normalized = (sessionLabel || "Closed").replace(/\s+/g, "").toLowerCase();
  badge.className = `session-badge ${normalized}`;
  badge.innerText = sessionLabel || "Closed";
}

function isSavedTicker(ticker){
  return watchlist.includes(ticker);
}

function loadLocalWatchlist(){
  try{
    const raw = localStorage.getItem(WATCHLIST_STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed)
      ? parsed.map(t => String(t).toUpperCase().trim()).filter(Boolean)
      : [];
  }catch(err){
    console.log("Local watchlist read failed", err);
    return [];
  }
}

function saveLocalWatchlist(){
  try{
    localStorage.setItem(WATCHLIST_STORAGE_KEY, JSON.stringify(watchlist));
  }catch(err){
    console.log("Local watchlist save failed", err);
  }
}

function loadPaperPositions(){
  try{
    const raw = localStorage.getItem(PAPER_POSITIONS_STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    paperPositions = Array.isArray(parsed) ? parsed : [];
  }catch(err){
    console.log("Paper positions read failed", err);
    paperPositions = [];
  }
}

function savePaperPositions(){
  try{
    localStorage.setItem(PAPER_POSITIONS_STORAGE_KEY, JSON.stringify(paperPositions));
  }catch(err){
    console.log("Paper positions save failed", err);
  }
}

function formatEtLabel(unixSeconds){
  const date = new Date(unixSeconds * 1000);
  return `${intradayEtFormatter.format(date)} ET`;
}

function formatAxisTickLabel(unixSeconds){
  return intradayAxisFormatter.format(new Date(unixSeconds * 1000));
}

function getWatchButtonMarkup(ticker){
  if(isSavedTicker(ticker)){
    return `<button class="saved-btn" onclick="return false;">Saved ✓</button>`;
  }
  return `<button onclick="addWatch('${ticker}')">+ Watch</button>`;
}

function formatAge(seconds){
  const rounded = Math.max(0, Math.round(seconds || 0));
  return `${rounded}s ago`;
}

function getWatchButtonMarkup(ticker){
  if(isSavedTicker(ticker)){
    return `<button class="saved-btn" onclick="return false;">Saved</button>`;
  }
  return `<button onclick="addWatch('${ticker}')">+ Watch</button>`;
}

function getTrendArrow(value){
  if(value > 0) return "↑";
  if(value < 0) return "↓";
  return "→";
}

function renderSparkline(points, positive){
  if(!Array.isArray(points) || points.length < 2){
    return "";
  }

  const min = Math.min(...points);
  const max = Math.max(...points);
  const range = Math.max(max - min, 0.01);
  const width = 78;
  const height = 28;
  const coords = points.map((point, index) => {
    const x = (index / (points.length - 1)) * width;
    const y = height - (((point - min) / range) * (height - 4)) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const stroke = positive ? "#22c55e" : "#ef4444";

  return `
    <svg class="watch-sparkline" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-hidden="true">
      <polyline fill="none" stroke="${stroke}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" points="${coords}"></polyline>
    </svg>
  `;
}

function renderSkewIndicator(skew){
  if(!skew){
    return "";
  }

  const changeClass = skew.change >= 0 ? "up" : "down";
  const changePrefix = skew.change >= 0 ? "+" : "";
  const skewTone =
    skew.value >= 150 ? "skew-high" :
    skew.value >= 135 ? "skew-mid" :
    "skew-low";
  const sourceLabel =
    skew.is_stale ? `Cached ${formatAge(skew.cache_age_seconds)}` :
    skew.is_cached ? "Recent cached reading" :
    "Latest reading";

  return `
    <div class="section">
      <div>CBOE SKEW Index</div>
      <div class="indicator-grid">
        <div class="indicator-card ${skewTone}">
          <div class="indicator-name">Reading</div>
          <div class="indicator-value">${skew.value}</div>
          <div class="indicator-meta ${changeClass}"><span class="trend-arrow">${getTrendArrow(skew.change)}</span> ${changePrefix}${skew.change} vs prior close</div>
        </div>
        <div class="indicator-card ${skewTone}">
          <div class="indicator-name">Tail Risk</div>
          <div class="indicator-value" style="font-size:20px;">${skew.signal}</div>
          <div class="indicator-meta">${sourceLabel}</div>
        </div>
      </div>
    </div>
  `;
}

function renderTradeSignal(signal){
  if(!signal){
    return "";
  }

  const chipClass =
    signal.action === "BUY" ? "buy" :
    signal.action === "SELL" ? "sell" :
    "wait";

  return `
    <div class="section">
      <div>Trade Signal</div>
      <div class="signal-chip ${chipClass}">${signal.action}</div>
      <div class="indicator-meta">${signal.reason}</div>
    </div>
  `;
}

function renderPaperActions(ticker){
  return `
    <div class="paper-actions">
      <button class="paper-btn buy" onclick="addPaperTrade('BUY')">Paper Buy</button>
      <button class="paper-btn sell" onclick="addPaperTrade('SELL')">Paper Sell</button>
    </div>
  `;
}

function openWatchlist(){
  document.getElementById("watchPanel").classList.add("open");
  document.getElementById("watchBackdrop").classList.add("open");
}

function closeWatchlist(){
  document.getElementById("watchPanel").classList.remove("open");
  document.getElementById("watchBackdrop").classList.remove("open");
}

function manualRefresh(){
  if(lastTicker){
    analyze(lastTicker);
  }else{
    setStatus("Search a ticker first, then you can manually refresh it here.", "warning");
  }
}

function setLoadingState(loading){
  isLoading = loading;

  const analyzeBtn = document.querySelector(".analyze-btn");
  const refreshBtn = document.getElementById("refreshBtn");

  if(analyzeBtn){
    analyzeBtn.disabled = loading;
    analyzeBtn.innerText = loading ? "Loading..." : "Analyze";
  }

  if(refreshBtn){
    refreshBtn.disabled = loading;
    refreshBtn.innerText = loading ? "Refreshing..." : "Refresh Now";
  }
}

function showChartMessage(message){
  setChartMeta(lastTicker, "No chart loaded");
  setSessionBadge("Closed");
  document.getElementById("chart").innerHTML = `<div class="chart-empty">${message}</div>`;
}

function buildLineTrace(xValues, yValues, name, color, width=2, axis="y"){
  return {
    x: xValues,
    y: yValues,
    type: "scatter",
    mode: "lines",
    name,
    line: { color, width, shape: "spline" },
    hoverinfo: "skip",
    yaxis: axis
  };
}

function renderChart(ticker, candles, indicators, sourceLabel, sessionLabel){
  const container = document.getElementById("chart");
  container.innerHTML = "";
  setChartMeta(ticker, sourceLabel);
  setSessionBadge(sessionLabel || "Closed");
  const etLabels = candles.map(c => formatEtLabel(c.time));
  const tickStep = Math.max(1, Math.ceil(candles.length / 6));
  const tickVals = [];
  const tickText = [];
  const xValues = candles.map(c => new Date(c.time * 1000));

  candles.forEach((candle, index) => {
    if(index % tickStep === 0 || index === candles.length - 1){
      tickVals.push(xValues[index]);
      tickText.push(formatAxisTickLabel(candle.time));
    }
  });

  const traces = [{
    x: xValues,
    open: candles.map(c => c.open),
    high: candles.map(c => c.high),
    low: candles.map(c => c.low),
    close: candles.map(c => c.close),
    customdata: etLabels,
    hovertemplate:
      "Time: %{customdata}<br>" +
      "Open: $%{open:.2f}<br>" +
      "High: $%{high:.2f}<br>" +
      "Low: $%{low:.2f}<br>" +
      "Close: $%{close:.2f}<extra></extra>",
    type: "candlestick",
    increasing: { line: { color: "#22c55e", width: 1 } },
    decreasing: { line: { color: "#ef4444", width: 1 } },
    whiskerwidth: 0.5,
    name: "Price",
    yaxis: "y"
  }];

  if(indicators?.ema9?.length){
    traces.push(buildLineTrace(xValues, indicators.ema9, "EMA 9", "#f59e0b", 2));
  }
  if(indicators?.ema20?.length){
    traces.push(buildLineTrace(xValues, indicators.ema20, "EMA 20", "#60a5fa", 2));
  }
  if(indicators?.vwap?.length){
    traces.push(buildLineTrace(xValues, indicators.vwap, "VWAP", "#fb923c", 2));
  }

  const hasRsi = indicators?.rsi14?.some(v => v !== null && v !== undefined);
  if(hasRsi){
    traces.push(buildLineTrace(xValues, indicators.rsi14, "RSI 14", "#c084fc", 2, "y2"));
  }

  const layout = {
    paper_bgcolor: "#020617",
    plot_bgcolor: "#020617",
    margin: { l: 18, r: 72, t: 18, b: 62 },
    font: { color: "#94a3b8" },
    legend: {
      orientation: "h",
      x: 0,
      y: 1.12,
      bgcolor: "rgba(4,17,31,0.65)",
      bordercolor: "#21314c",
      borderwidth: 1,
      font: { size: 11 }
    },
    xaxis: {
      rangeslider: { visible: false },
      gridcolor: "#1e293b",
      linecolor: "#1e293b",
      tickcolor: "#1e293b",
      type: "date",
      tickmode: "array",
      tickvals: tickVals,
      ticktext: tickText,
      tickangle: 0,
      automargin: true,
      tickfont: { size: 11 },
      fixedrange: true,
      domain: [0, 1]
    },
    yaxis: {
      side: "right",
      gridcolor: "#1e293b",
      linecolor: "#1e293b",
      tickcolor: "#1e293b",
      automargin: true,
      tickfont: { size: 11 },
      fixedrange: true,
      domain: hasRsi ? [0.30, 1] : [0, 1]
    },
    yaxis2: hasRsi ? {
      side: "right",
      domain: [0, 0.20],
      range: [0, 100],
      gridcolor: "#1e293b",
      linecolor: "#1e293b",
      tickcolor: "#1e293b",
      tickfont: { size: 10 },
      fixedrange: true
    } : undefined,
    shapes: hasRsi ? [
      {
        type: "line",
        xref: "paper",
        x0: 0,
        x1: 1,
        yref: "y2",
        y0: 70,
        y1: 70,
        line: { color: "#7c2d12", width: 1, dash: "dot" }
      },
      {
        type: "line",
        xref: "paper",
        x0: 0,
        x1: 1,
        yref: "y2",
        y0: 30,
        y1: 30,
        line: { color: "#14532d", width: 1, dash: "dot" }
      }
    ] : [],
    annotations: hasRsi ? [{
      text: "RSI 14",
      xref: "paper",
      yref: "paper",
      x: 0,
      y: 0.22,
      showarrow: false,
      font: { size: 10, color: "#94a3b8" }
    }] : []
  };

  Plotly.newPlot(container, traces, layout, {
    responsive: true,
    displayModeBar: false,
    scrollZoom: false
  });
}

function getPaperMarkPrice(ticker){
  return latestQuotes[ticker] || null;
}

function renderPaperPositions(){
  const summary = document.getElementById("paperSummary");
  const list = document.getElementById("paperPositions");
  list.innerHTML = "";

  if(!paperPositions.length){
    summary.innerText = "No open paper positions yet.";
    list.innerHTML = '<div class="paper-empty">Analyze a ticker, then use Paper Buy or Paper Sell to simulate a trade.</div>';
    return;
  }

  let totalPnl = 0;

  paperPositions.forEach(position => {
    const markPrice = getPaperMarkPrice(position.ticker) || position.entry;
    const pnl = position.side === "BUY"
      ? (markPrice - position.entry) * position.qty
      : (position.entry - markPrice) * position.qty;
    totalPnl += pnl;

    const item = document.createElement("div");
    item.className = "paper-item";
    item.innerHTML = `
      <div>
        <div class="paper-symbol">${position.ticker} · ${position.side}</div>
        <div class="paper-details">
          Qty ${position.qty} · Entry $${position.entry.toFixed(2)} · Mark $${markPrice.toFixed(2)}
        </div>
        <div class="paper-details ${pnl >= 0 ? "up" : "down"}">
          Unrealized ${pnl >= 0 ? "+" : ""}$${pnl.toFixed(2)}
        </div>
      </div>
      <div>
        <button class="paper-btn close" onclick="closePaperPosition('${position.id}')">Close</button>
      </div>
    `;
    list.appendChild(item);
  });

  summary.innerText = `${paperPositions.length} open position${paperPositions.length === 1 ? "" : "s"} · Unrealized ${totalPnl >= 0 ? "+" : ""}$${totalPnl.toFixed(2)}`;
}

function addPaperTrade(side){
  if(!lastTicker || !latestQuotes[lastTicker]){
    setStatus("Analyze a ticker first so the paper trade uses a real mark price.", "warning");
    return;
  }

  paperPositions = [
    {
      id: `${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
      ticker: lastTicker,
      side,
      qty: 1,
      entry: Number(latestQuotes[lastTicker]),
      openedAt: new Date().toISOString()
    },
    ...paperPositions
  ];
  savePaperPositions();
  renderPaperPositions();
}

function closePaperPosition(id){
  paperPositions = paperPositions.filter(position => position.id !== id);
  savePaperPositions();
  renderPaperPositions();
}

document.addEventListener("click", (e)=>{
  if(e.target.dataset.s){
    strategy = e.target.dataset.s;
    document.querySelectorAll("#strategyBar button").forEach(b=>b.classList.remove("active"));
    e.target.classList.add("active");
    if(lastTicker) analyze(lastTicker);
  }

  if(e.target.dataset.tf){
    timeframe = e.target.dataset.tf;
    document.querySelectorAll("#tfBar button").forEach(b=>b.classList.remove("active"));
    e.target.classList.add("active");
    if(lastTicker) loadCandles(lastTicker);
  }
});

async function loadWatchlist(){
  watchlist = loadLocalWatchlist();

  try{
    if(!watchlist.length){
      const res = await fetch("/watchlist");
      const serverWatchlist = await res.json();
      if(Array.isArray(serverWatchlist) && serverWatchlist.length){
        watchlist = serverWatchlist.map(t => String(t).toUpperCase().trim()).filter(Boolean);
        saveLocalWatchlist();
      }
    }
    await loadWatchlistData();
    renderWatch();
  }catch(err){
    console.log("Watchlist load failed", err);
    await loadWatchlistData();
    renderWatch();
  }
}

async function loadWatchlistData(){
  if(!watchlist.length){
    watchlistData = [];
    return;
  }

  try{
    const params = new URLSearchParams({ tickers: watchlist.join(",") });
    const res = await fetch(`/watchlist/data?${params.toString()}`);
    watchlistData = await res.json();
    watchlistData.forEach(item => {
      latestQuotes[item.ticker] = item.price;
    });
    renderPaperPositions();
  }catch(err){
    console.log("Watchlist data load failed", err);
    watchlistData = [];
  }
}

async function addWatch(t){
  const normalized = t.toUpperCase();
  if(!watchlist.includes(normalized)){
    watchlist = [...watchlist, normalized];
    saveLocalWatchlist();
  }

  try{
    await fetch("/watchlist", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ticker: normalized })
    });
  }catch(err){
    console.log("Watchlist add failed", err);
  }

  await loadWatchlistData();
  renderWatch();
  if(lastTicker === normalized){
    updateWatchButton(normalized);
  }
}

async function removeWatch(t){
  const normalized = t.toUpperCase();
  watchlist = watchlist.filter(item => item !== normalized);
  saveLocalWatchlist();
  watchlistData = watchlistData.filter(item => item.ticker !== normalized);

  try{
    await fetch("/watchlist", {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ticker: normalized })
    });
  }catch(err){
    console.log("Watchlist remove failed", err);
  }

  renderWatch();
  if(lastTicker === normalized){
    updateWatchButton(normalized);
  }
}

function updateWatchButton(ticker){
  const container = document.getElementById("watchAction");
  if(container){
    container.innerHTML = getWatchButtonMarkup(ticker);
  }
}

function renderWatch(){
  const el=document.getElementById("watchlist");
  el.innerHTML="";

  if(!watchlist.length){
    el.innerHTML = '<div class="watch-empty">No saved tickers yet.</div>';
    return;
  }

  watchlist.forEach(t=>{
    const snapshot = watchlistData.find(item => item.ticker === t);
    const row = document.createElement("div");
    row.className = "watch-item";

    const ticker = document.createElement("div");
    ticker.className = "watch-ticker";
    const sparkline = snapshot ? renderSparkline(snapshot.sparkline, snapshot.change >= 0) : "";
    ticker.innerHTML = `
      <div class="watch-main">
        <div class="watch-copy">
          <div class="watch-symbol">${t}</div>
          <div class="watch-details">
            ${snapshot ? `$${snapshot.price} ` : ""}
            ${snapshot ? `<span class="${snapshot.change >= 0 ? "watch-change-up" : "watch-change-down"}">${snapshot.change >= 0 ? "+" : ""}${snapshot.change}%</span>` : "Loading..."}
          </div>
        </div>
        ${sparkline}
      </div>
    `;
    ticker.onclick = ()=>{
      closeWatchlist();
      analyze(t);
    };

    const removeBtn = document.createElement("button");
    removeBtn.className = "watch-remove";
    removeBtn.innerText = "Remove";
    removeBtn.onclick = ()=>removeWatch(t);

    row.appendChild(ticker);
    row.appendChild(removeBtn);
    el.appendChild(row);
  });
}

async function loadCandles(ticker){
  const cRes = await fetch(`/candles?ticker=${ticker}&tf=${timeframe}`);
  const payload = await cRes.json();
  const visibleCandles = Array.isArray(payload.candles) ? payload.candles : [];

  if(Array.isArray(visibleCandles) && visibleCandles.length){
    const sourceLabel =
      payload.is_demo ? "Demo data" :
      payload.is_stale ? "Cached real data" :
      payload.data_source === "live" ? "Live provider data" :
      "Chart data";

    const sessionLabel =
      payload.latest_candle_session && payload.market_session !== "Regular Hours"
        ? `${payload.market_session} · Last candles ${payload.latest_candle_session}`
        : (payload.market_session || payload.latest_candle_session || "Regular Hours");

    renderChart(ticker, visibleCandles, payload.indicators || {}, sourceLabel, sessionLabel);

    if(payload.is_demo){
      setLastUpdated("Demo candles loaded just now");
      setStatus("Live market data is unavailable, so this chart is using demo candles.", "warning");
    }else if(payload.warning){
      if(payload.is_stale || payload.is_cached){
        setLastUpdated(`Cached candles ${formatAge(payload.cache_age_seconds)}`);
      }
      setStatus(payload.warning, "warning");
    }else if(payload.is_stale){
      setLastUpdated(`Cached candles ${formatAge(payload.cache_age_seconds)}`);
      setStatus(`Showing cached candles from ${Math.round(payload.cache_age_seconds)}s ago.`, "warning");
    }else if(payload.data_source === "live"){
      setLastUpdated(`Live candles updated at ${new Date().toLocaleTimeString()}`);
    }
  }else{
    showChartMessage("No candle data returned for this ticker and timeframe yet.");
    if(payload.warning){
      if(payload.is_stale || payload.is_cached){
        setLastUpdated(`Cached candles ${formatAge(payload.cache_age_seconds)}`);
      }else{
        setLastUpdated("No recent candle data available");
      }
      setStatus(payload.warning, "warning");
    }
  }
}

async function analyze(sym){
  if(isLoading) return;

  let t=sym||document.getElementById("ticker").value.trim();
  if(!t) return;

  t=t.toUpperCase();
  lastTicker=t;
  setLoadingState(true);

  try{
    const res = await fetch(`/analyze?ticker=${t}&strategy=${strategy}`);
    const d = await res.json();

    if(!d || d.error){
      document.getElementById("result").innerHTML = "";
      showChartMessage("No chart data is available yet. Try Refresh Now after a moment.");
      setLastUpdated("No recent market data available");
      setStatus("Live provider data is temporarily unavailable.", "warning");
      return;
    }

    let statusMessage = "Live market data loaded.";
    let statusTone = "ok";

    if(d.is_demo){
      statusMessage = "Live market data is unavailable, so this result is using demo data.";
      statusTone = "warning";
      setLastUpdated("Demo quote loaded just now");
    }else if(d.is_stale){
      statusMessage = `Showing cached quote data from ${Math.round(d.cache_age_seconds)}s ago because live data is temporarily unavailable.`;
      statusTone = "warning";
      setLastUpdated(`Cached quote ${formatAge(d.cache_age_seconds)}`);
    }else if(d.is_cached){
      statusMessage = `Showing recent cached quote data from ${Math.round(d.cache_age_seconds)}s ago.`;
      setLastUpdated(`Cached quote ${formatAge(d.cache_age_seconds)}`);
    }else{
      setLastUpdated(`Live quote just updated at ${new Date().toLocaleTimeString()}`);
    }

    latestQuotes[t] = d.price;

    document.getElementById("result").innerHTML = `
      <div class="card">
        <div class="ticker-label">${d.ticker}</div>
        <div class="price-row">
          <div class="price">$${d.price}</div>
          <div class="change-pill ${d.change>=0?'up':'down'}">
            <span class="trend-arrow">${getTrendArrow(d.change)}</span>
            <span>${d.change>=0?'+':''}${d.change}%</span>
          </div>
        </div>

        <div id="watchAction">${getWatchButtonMarkup(d.ticker)}</div>

        ${renderPaperActions(d.ticker)}

        ${renderTradeSignal(d.indicators?.trade_signal)}

        <div class="section">
          Entry: ${d.plan.entry}<br>
          Stop: ${d.plan.stop}<br>
          Targets: ${d.plan.targets.join(", ")}
        </div>

        ${renderSkewIndicator(d.indicators?.skew)}

        <div class="section">${d.summary}</div>
      </div>
    `;

    setStatus(statusMessage, statusTone);
    await loadWatchlistData();
    renderWatch();
    renderPaperPositions();

    await loadCandles(t);
  }catch(err){
    console.log(err);
    setLastUpdated("Update failed");
    setStatus("Something went wrong while loading market data.", "warning");
  }finally{
    setLoadingState(false);
  }
}

document.getElementById("ticker").addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    analyze();
  }
});

function getTrendArrow(value){
  if(value > 0) return "↑";
  if(value < 0) return "↓";
  return "→";
}

function getWatchButtonMarkup(ticker){
  if(isSavedTicker(ticker)){
    return `<button class="saved-btn" onclick="return false;">Saved</button>`;
  }
  return `<button onclick="addWatch('${ticker}')">+ Watch</button>`;
}

loadPaperPositions();
renderPaperPositions();
showChartMessage("Search for a ticker, then click Analyze to load the chart.");
loadWatchlist();
</script>
